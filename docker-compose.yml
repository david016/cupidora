version: "3.8"

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: cupidora-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cupidora
      POSTGRES_PASSWORD: cupidora
      POSTGRES_DB: cupidora_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cupidora-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
